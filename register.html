<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission - UIU Hostel Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Simplified Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <h2>UIU <span>HMS</span></h2>
        </a>
        <a href="index.html" class="btn btn-outline">Back to Home</a>
    </nav>

    <!-- Registration Section -->
    <div class="auth-container">
        <!-- We use a wider card for registration to fit the two-column grid -->
        <div class="auth-card register-card">
            <div class="auth-header">
                <h2>Hostel Admission</h2>
                <p>Create your account and apply for a room.</p>
            </div>

            <form class="auth-form" action="#" method="POST">
                
                <!-- We wrap the inputs in a grid layout for better spacing -->
                <div class="form-grid">
                    
                    <!-- First Name -->
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="form-control" placeholder="e.g. Omor" required>
                    </div>

                    <!-- Last Name -->
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="form-control" placeholder="e.g. Faruk" required>
                    </div>

                    <!-- Student ID -->
                    <div class="form-group">
                        <label for="studentId">Student ID</label>
                        <input type="text" id="studentId" name="studentId" class="form-control" placeholder="011223344" required>
                    </div>

                    <!-- Department -->
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" class="form-control" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="cse">Computer Science & Engineering (CSE)</option>
                            <option value="eee">Electrical & Electronic Eng. (EEE)</option>
                            <option value="bba">Business Administration (BBA)</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">University Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="omar.farukh16@uiu.ac.bd" required>
                    </div>

                    <!-- Phone Number -->
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="+880 1XXX XXXXXX" required>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Create Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Min 8 characters" required>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Retype password" required>
                    </div>
                    
                </div> <!-- End of form-grid -->

                <!-- NID Upload (Full Width) -->
                <div class="form-group file-upload-group">
                    <label for="nidUpload">Upload NID / Birth Certificate (PDF or Image)</label>
                    <input type="file" id="nidUpload" name="nidUpload" class="form-control file-input" accept=".pdf, image/jpeg, image/png" required>
                </div>

                <!-- Terms and Conditions -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> I agree to the <a href="#rules" style="color: var(--primary-color);">Hostel Rules & Regulations</a>.
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary btn-full">Submit Application</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Log in here</a></p>
            </div>
        </div>
    </div>

</body>
</html>
