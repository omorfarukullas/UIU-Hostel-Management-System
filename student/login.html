<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - StayNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <style>
    .icon-sm {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .icon-md {
      width: 20px; height: 20px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .input-icon-wrapper {
      position: relative;
    }
    .input-icon-wrapper .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }
    .input-icon-wrapper input {
      padding-left: 38px;
    }
    .input-icon-wrapper input:focus ~ .input-icon,
    .input-icon-wrapper input:focus + .input-icon {
      color: var(--accent-blue);
    }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div style="width:100%;max-width:420px;">
    <!-- Card -->
    <div class="auth-card fade-up" style="box-shadow:var(--shadow-lg);">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5v11a1.5 1.5 0 01-1.5 1.5h-15A1.5 1.5 0 013 20.5v-11z"/>
            <path d="M9 22V12h6v10"/>
          </svg>
        </div>
        <div class="logo-text">
          <div class="brand">StayNest</div>
          <div class="tag">Hostel Management Portal</div>
        </div>
      </div>

      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Sign in to your student account to continue</div>

      <div id="alertBox"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrapper">
          <svg class="icon-md input-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" style="padding-left:38px;" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrapper">
          <svg class="icon-md input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" style="padding-left:38px;" />
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <label style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-secondary);cursor:pointer;">
          <input type="checkbox" style="accent-color:var(--accent-blue);" /> Remember me
        </label>
        <a href="#" style="font-size:12px;color:var(--accent-blue);text-decoration:none;font-weight:500;">Forgot password?</a>
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="handleLogin()">
        <svg class="icon-md" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>

      <hr class="divider" />

      <p style="text-align:center;font-size:12px;color:var(--text-muted);">
        Don't have an account?
        <a href="register.html" style="color:var(--accent-blue);text-decoration:none;font-weight:500;">Create account</a>
      </p>
    </div>

    <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px;">
      © 2025 StayNest · All rights reserved
    </p>
  </div>
</div>

<script>
function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const box = document.getElementById('alertBox');

  if (!email || !password) {
    box.innerHTML = `<div class="alert alert-warning fade-up">
      <svg class="icon-sm" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Please fill in all fields.
    </div>`;
    return;
  }
  box.innerHTML = `<div class="alert alert-success fade-up">
    <svg class="icon-sm" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Login successful! Redirecting...
  </div>`;
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
