<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - StayNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <style>
    .icon-sm {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .icon-md {
      width: 20px; height: 20px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
  </style>
</head>
<body>
<div class="auth-wrapper" style="align-items:flex-start;padding:40px 20px;">
  <div style="width:100%;max-width:500px;margin:0 auto;">
    <div class="auth-card fade-up" style="box-shadow:var(--shadow-lg);">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5v11a1.5 1.5 0 01-1.5 1.5h-15A1.5 1.5 0 013 20.5v-11z"/>
            <path d="M9 22V12h6v10"/>
          </svg>
        </div>
        <div class="logo-text">
          <div class="brand">StayNest</div>
          <div class="tag">Hostel Management Portal</div>
        </div>
      </div>

      <div class="auth-title">Create your account</div>
      <div class="auth-subtitle">Register as a student resident to get started</div>

      <div id="alertBox"></div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" placeholder="Arif" />
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" placeholder="Rahman" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="arif@university.edu" />
      </div>

      <div class="form-group">
        <label class="form-label">Student ID</label>
        <input type="text" class="form-control" placeholder="e.g. STU-2024-0081" />
      </div>

      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" placeholder="+880 1XXX-XXXXXX" />
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Create password" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" placeholder="Repeat password" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Upload Student ID Card</label>
        <div class="upload-zone" onclick="document.getElementById('idFile').click()">
          <div style="margin-bottom:8px;display:flex;justify-content:center;">
            <svg class="icon-md" viewBox="0 0 24 24" style="color:var(--text-muted);">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p>Click to upload your student ID card (JPG, PNG, PDF)</p>
          <input type="file" id="idFile" style="display:none;" accept=".jpg,.jpeg,.png,.pdf" />
        </div>
      </div>

      <label style="display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text-secondary);cursor:pointer;margin-bottom:20px;">
        <input type="checkbox" style="accent-color:var(--accent-blue);margin-top:2px;" />
        I agree to the hostel <a href="#" style="color:var(--accent-blue);">terms & conditions</a> and <a href="#" style="color:var(--accent-blue);">privacy policy</a>.
      </label>

      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="handleRegister()">
        <svg class="icon-md" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Create Account
      </button>

      <hr class="divider" />

      <p style="text-align:center;font-size:12px;color:var(--text-muted);">
        Already have an account?
        <a href="login.html" style="color:var(--accent-blue);text-decoration:none;font-weight:500;">Sign in</a>
      </p>
    </div>
    <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px;">
      © 2025 StayNest · All rights reserved
    </p>
  </div>
</div>

<script>
function handleRegister() {
  const box = document.getElementById('alertBox');
  box.innerHTML = `<div class="alert alert-success fade-up">
    <svg class="icon-sm" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Account created! You can now submit an admission request.
  </div>`;
  setTimeout(() => { window.location.href = 'admission.html'; }, 1500);
}
</script>
</body>
</html>
